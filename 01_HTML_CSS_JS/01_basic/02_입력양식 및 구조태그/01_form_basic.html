<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!--
    form 태그: 사용자로부터 입력을 받기위한 양식을 만드는 태그
    action: 폼데이터를 전송할 서버의 url (생략시 현재 url)
    method: 데이터 전송 방식(GET/POST) (생략시 GET)
    -->
    <form>
      <table>
        <tr>
          <td><label for="username">이름</label></td>
          <!--
          input 태그
          name 속성: 서버로 전송될 때 사용되는 이름
          id 속성: html 요소의 고유식별자
          type: 입력필드의 종류
          -->
          <td><input id="username" name="username" type="text" /></td>
        </tr>

        <tr>
          <td>성별</td>
          <td>
            <input id="man" type="radio" name="gender" value="m" />
            <label for="man">남자</label>
            <input id="woman" type="radio" name="gender" value="w" />
            <label for="woman">여자</label>
            <!--
            남/여 name을 같은 gender로 설정
            -> request로 들어갈 때 하나만 들어가므로 남/여 하나만 선택됨
            -->
          </td>
        </tr>
      </table>
      <input type="submit" />
    </form>
  </body>
</html>
