<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 
      시맨틱(Semantic) 태그란?
      - HTML5에서 도입된 의미론적 태그들
      - 콘텐츠의 의미와 구조를 명확하게 설명하는 태그
      
      주요 시맨틱 태그들:
      
      1. <header>
        - 문서나 섹션의 머리말
        - 로고, 제목, 네비게이션 등을 포함
      
      2. <nav>
        - 네비게이션 링크의 모음
        - 메인 메뉴, 사이드 메뉴 등에 사용
      
      3. <main>
        - 문서의 주요 콘텐츠를 담는 영역
        - 페이지당 하나만 사용 가능
      
      4. <article>
        - 독립적으로 구분되거나 재사용 가능한 영역
        - 블로그 포스트, 뉴스 기사 등
      
      5. <section>
        - 관련 있는 콘텐츠를 묶는 영역
        - 챕터, 탭 내용 등을 구분
      
      6. <aside>
        - 본문과 간접적으로 연관된 내용
        - 사이드바, 광고 등
      
      7. <footer>
        - 문서나 섹션의 푸터
        - 저작권, 연락처 정보 등을 포함
      
      장점:
      - 검색엔진 최적화(SEO) 향상
      - 웹 접근성 개선
      - 코드 가독성과 유지보수성 향상
    -->
    <body>
      <header>
        <h1>HTML5 기본</h1>
      </header>
      <nav>
        <ul>
          <li><a href="#">메뉴 - 1</a></li>
          <li><a href="#">메뉴 - 2</a></li>
          <li><a href="#">메뉴 - 3</a></li>
        </ul>
      </nav>
      <section>
        <article>
          <h1>Lorem ipsum dolor sit amet</h1>
          <p>Lorem ipsum dolor sit amet.</p>
        </article>
        <article>
          <h1>Lorem ipsum dolor sit amet</h1>
          <p>Lorem ipsum dolor sit amet.</p>
        </article>
      </section>
      <footer>
        <span>서울특별시 강서구 내발산동</span>
      </footer>
    </body>
  </body>
</html>
