<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      1보다 큰 수: <input type="text" v-model.number="num" />
      <br />
      1부터 입력한 값까지의 합: <span>{{sum}}</span><br />
      1부터 입력한 값까지의 합: <span>{{sum}}</span><br />
      1부터 입력한 값까지의 합: <span>{{sum}}</span><br />
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            num: 0,
          };
        },

        // Computed 속성
        // 데이터 기반의 계산된 속성을 정의할 때 사용
        // 의존하는 데이터(반응형 데이터)가 변경될 때만 재계산 (캐싱 제공)
        // 템플릿에서 여러번 사용해도 계산은 한 번만 수행
        computed: {
          // 결과값이 바뀌지 않는 이상 메서드 재동작 X
          sum() {
            let n = this.num;
            console.log("num: " + this.num);
            return (n * (n + 1)) / 2;
          },
        },
        methods: {},
      }).mount('#app');
    </script>
  </body>
</html>
