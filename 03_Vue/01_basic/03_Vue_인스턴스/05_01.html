<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue instance 05_01</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      금액: <input type="text" v-model.number="amount" /> <br />
      <button @click="input">입금</button>
      <button @click="output">인출</button> <br />
      <h3>계좌 잔고 : {{balance}}</h3>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const amount = ref(0);
          const balance = ref(0);

          const input = () => {
            balance.value += amount.value;
          };

          const output = () => {
            balance.value -= amount.value;
          };

          return { amount, balance, input, output };
        },
      }).mount('#app');
    </script>
  </body>
</html>
