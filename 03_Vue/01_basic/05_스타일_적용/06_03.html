<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <button
        :style="{backgroundColor,
        color}"
        @mouseover.stop="overEvent"
        @mouseout.stop="outEvent"
      >
        테스트
      </button>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const backgroundColor = ref('aqua');
          const color = ref('black');

          const overEvent = () => {
            backgroundColor.value = 'purple';
            color.value = 'yellow';
          };
          const outEvent = () => {
            backgroundColor.value = 'aqua';
            color.value = 'black';
          };

          return { backgroundColor, color, overEvent, outEvent };
        },
      }).mount('#app');
    </script>
  </body>
</html>
