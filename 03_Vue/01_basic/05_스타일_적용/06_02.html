<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <button
        :style="style1"
        @mouseover.stop="overEvent"
        @mouseout.stop="outEvent"
      >
        테스트
      </button>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const style1 = ref({
            backgroundColor: 'aqua',
            color: 'black',
          });

          const overEvent = () => {
            style1.value.backgroundColor = 'purple';
            style1.value.color = 'yellow';
          };
          const outEvent = () => {
            style1.value.backgroundColor = 'aqua';
            style1.value.color = 'black';
          };

          return { style1, overEvent, outEvent };
        },
      }).mount('#app');
    </script>
  </body>
</html>
