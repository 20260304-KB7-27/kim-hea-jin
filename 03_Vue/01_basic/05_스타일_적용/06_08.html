<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 스타일 처리 06_08</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .btnColor {
        background-color: aqua;
        color: black;
      }
      .btnAlign {
        text-align: center;
        width: 120px;
      }
      .btnBorder {
        border: pink dashed 1px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <input type="checkbox" v-model="btnColor" />
      색상 <br />
      <input type="checkbox" v-model="btnAlign" />
      정렬, 크기 <br />
      <input type="checkbox" v-model="btnBorder" />
      테두리 <br />
      <!-- btnColor, btnAlign, btnBorder에 true값 들어오면(클릭되면) 실행-->
      <button :class="{btnColor, btnAlign, btnBorder}">버튼</button>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const btnColor = ref(false);
          const btnAlign = ref(false);
          const btnBorder = ref(false);
          return { btnAlign, btnBorder, btnColor };
        },
      }).mount('#app');
    </script>
  </body>
</html>
