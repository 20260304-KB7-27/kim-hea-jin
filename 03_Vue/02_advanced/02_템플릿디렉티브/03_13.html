<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue3 v-for table</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      #list {
        width: 600px;
        border: 1px solid black;
        border-collapse: collapse;
      }
      #list td,
      #list th {
        border: 1px solid black;
        text-align: center;
      }
      #list > thead > tr {
        color: yellow;
        background-color: purple;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <table id="list">
        <thead>
          <tr>
            <th>번호</th>
            <th>이름</th>
            <th>전화번호</th>
          </tr>
        </thead>
        <tbody id="contacts">
          <template v-for="(contact, index) in contacts" :key="contact.no">
            <tr>
              <td>{{contact.no}}</td>
              <td>{{contact.name}}</td>
              <td>{{contact.tel}}</td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const contacts = ref([
            { no: 1011, name: 'RM', tel: '010-3456-8299' },
            { no: 1012, name: '정국', tel: '010-3456-8298' },
            { no: 1013, name: '제이홉', tel: '010-3456-8297' },
            { no: 1014, name: '슈가', tel: '010-3456-8296' },
          ]);
          return { contacts };
        },
      }).mount('#app');
    </script>
  </body>
</html>
