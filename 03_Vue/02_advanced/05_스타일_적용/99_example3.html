<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 게시판 목록</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v3</h1>
      <!-- 새 게시글 작성 -->
      <div class="m-3 d-flex justify-content-center align-items-center gap-2">
        <input
          type="text"
          placeholder="새 게시글 제목"
          v-model.trim="postTitle"
        />
        <input
          type="text"
          placeholder="새 게시글 내용"
          v-model.trim="postContent"
        />
        <button @click="addPost">저장</button>
      </div>

      <ul>
        <li
          v-for="value in sortedPosts"
          :key="value.id"
          class="post-item"
        >
          <span>
            <span @click="content(value.id)">
              {{value.no}}. {{value.title}} {{ selectid == value.id ? '▼' : '▲'
              }}
            </span>
            <!-- 수정 중이 아닐 때 -->
            <div
              v-if="selectid == value.id && modifyid !== value.id"
              class="post-content"
            >
              <p>{{value.title}}</p>
              <p>{{value.content}}</p>
              <button @click.stop="modify(value.id)">수정</button>
              <button @click.stop="deleted(value.id)">삭제</button>
              <button @click.stop="selectid = null">닫기</button>
            </div>
            <!-- 수정 form -->
            <div v-if="modifyid == value.id" class="d-flex flex-column gap-2">
              <input type="text" v-model.trim="value.title" />
              <textarea v-model.trim="value.content" rows="4"></textarea>
              <div class="d-flex gap-2">
                <button @click.stop="saveModify(value)">저장</button>
                <button @click.stop="cancelModify(value)">취소</button>
              </div>
            </div>
          </span>
        </li>
      </ul>
    </div>

    <script>
      const { createApp, ref, computed } = Vue;

      createApp({
        setup() {
          const selectid = ref(null);
          const content = (id) => {
            selectid.value = selectid.value === id ? null : id;
          };

          const posts = ref([
            {
              id: new Date().getTime() + 1,
              no: 1,
              title: 'Vue.js 기초 배우기',
              content:
                'Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.',
            },
            {
              id: new Date().getTime() + 2,
              no: 2,
              title: '자바스크립트 ES6 문법',
              content:
                'ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.',
            },
            {
              id: new Date().getTime() + 3,
              no: 3,
              title: 'Node.js와 Express',
              content:
                'Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.',
            },
            {
              id: new Date().getTime() + 4,
              no: 4,
              title: 'MongoDB 기본 개념',
              content:
                'MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.',
            },
            {
              id: new Date().getTime() + 5,
              no: 5,
              title: '프론트엔드와 백엔드의 차이',
              content:
                '프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.',
            },
            {
              id: new Date().getTime() + 6,
              no: 6,
              title: '비동기 프로그래밍',
              content:
                'JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.',
            },
            {
              id: new Date().getTime() + 7,
              no: 7,
              title: 'Vue Router 사용법',
              content:
                'Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.',
            },
            {
              id: new Date().getTime() + 8,
              no: 8,
              title: '컴포넌트 기반 개발',
              content:
                'Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.',
            },
            {
              id: new Date().getTime() + 9,
              no: 9,
              title: 'CSS와 SCSS 차이점',
              content:
                'SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.',
            },
            {
              id: new Date().getTime() + 10,
              no: 10,
              title: 'Git과 GitHub 사용법',
              content:
                'Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.',
            },
          ]);

          // no 내림차순 정렬
          const sortedPosts = computed(() => {
            return [...posts.value].sort((a, b) => b.no - a.no);
          });

          const postTitle = ref('');
          const postContent = ref('');
          // post 추가
          const addPost = () => {
            if (postTitle.value === '' || postContent.value === '') return;
            posts.value.push({
              id: new Date().getTime(),
              no: posts.value.length + 1,
              title: postTitle.value,
              content: postContent.value,
            });
            postTitle.value = '';
            postContent.value = '';
          };

          const modifyid = ref(null);
          const tempTitle = ref('');
          const tempContent = ref('');
          // post 수정
          const modify = (id) => {
            const item = posts.value.find((item) => item.id === id);
            tempTitle.value = item.title;
            tempContent.value = item.content;
            modifyid.value = id;
          };
          const saveModify = (value) => {
            const item = posts.value.find((item) => item.id === value.id);
            item.title = value.title;
            item.content = value.content;
            modifyid.value = null;
          };
          const cancelModify = (value) => {
            const item = posts.value.find((item) => item.id === value.id);
            item.title = tempTitle.value;
            item.content = tempContent.value;
            modifyid.value = null;
          };

          // post 삭제
          const deleted = (id) => {
            if (confirm('정말로 삭제하시겠습니까?')) {
              const index = posts.value.findIndex((item) => item.id === id);
              posts.value.splice(index, 1);
              selectid.value = null;
            }
          };

          return {
            posts,
            content,
            selectid,
            sortedPosts,
            postTitle,
            postContent,
            addPost,
            modifyid,
            modify,
            saveModify,
            cancelModify,
            deleted,
          };
        },
      }).mount('#app');
    </script>

    <style>
      h1 {
        text-align: center;
        color: #333;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      .post-item {
        cursor: pointer;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
      }
      .post-item:hover {
        background: #f4f4f4;
      }
      .post-content {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: #fff;
      }
      button {
        margin-top: 10px;
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
      }
      button:hover {
        background: #ff4f4f;
      }
    </style>
  </body>
</html>
