<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue ToDoList App</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>:: ToDoList App::</h1>

      <!-- ToDo add -->
      <div>
        <!-- @keyup.enter: enter 키를 누르면 addTodo 함수 호출 -->
        <input
          type="text"
          v-model.trim="todo"
          @keyup.enter.exact="addTodo"
          @keyup.ctrl.enter.exact="addTodo"
        />
        <button @click="addTodo">추가</button>
      </div>

      <!-- ToDo list -->
      <ul>
        <li
          v-for="todoitem in todolist"
          :key="todoitem.id"
          @click="toggleCompleted(todoitem.id)"
        >
          <span
            :style="{textDecoration: todoitem.completed ? 'line-through' : 'none'}"
            >{{todoitem.todo}} {{todoitem.completed ? "[완료]" : ""}}</span
          >

          <!-- 삭제하기 -->
          <button @click.stop="deleteTodo(todoitem.id)">삭제</button>
        </li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      let ts = new Date().getTime();

      createApp({
        setup() {
          // 새로 추가되는 todo
          const todo = ref('');

          const todolist = ref([
            { id: ts, todo: '자전거 타기', completed: false },
            { id: ts + 1, todo: '딸과 공원 산책', completed: true },
            { id: ts + 2, todo: '일요일 애견 카페', completed: false },
            { id: ts + 3, todo: 'Vue 원고 집필', completed: false },
          ]);

          const deleteTodo = (id) => {
            // findIndex(콜백): 콜백함수가 true를 반환하는 첫번째 요소의 인덱스 반환
            let index = todolist.value.findIndex((item) => id === item.id);
            // splice(인덱스, 삭제할 요소 개수): 인덱스부터 개수만큼 배열의 요소 삭제
            todolist.value.splice(index, 1);
          };

          // 완료상태 토글기능
          const toggleCompleted = (id) => {
            // findIndex(콜백): 콜백함수가 true를 반환하는 첫번째 요소의 인덱스 반환
            let index = todolist.value.findIndex((item) => id === item.id);
            // 해당 completed 속성 반대로 바꿈
            todolist.value[index].completed = !todolist.value[index].completed;
          };

          // create todo
          const addTodo = (e) => {
            // 빈 문자열 예외처리
            if (todo.value === '') return;

            // 배열에 추가
            todolist.value.push({
              id: new Date().getTime(),
              todo: todo.value,
              // ctrl+enter시 완료 상태로 저장
              completed: e.ctrlKey ? true : false,
            });

            // todo 초기화
            todo.value = '';
          };

          return { todo, todolist, addTodo, deleteTodo, toggleCompleted };
        },
      }).mount('#app');
    </script>
  </body>
</html>
